<!DOCTYPE html>
<html lang="en">
<head>

    <title>delete</title>
    <style>
        body {
            text-align: center;
            background-color: #808000;
        }

        .box {
            background-color: black;
            color: white;
            display: inline-block;
            padding: 20px;
            border-radius: 10px;
        }

        button {
            padding: 8px 15px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        a {
            color: yellow;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<h3> Do you want to delete this entire record ? </h3>
<form method="post">
    {% csrf_token %}

    <label for="delete_name">Name : </label>
    <input type="text" id="delete_name" value="{{delete_student.student_name}}" readonly><br><br>

     <label for="delete_email" >Email : </label>
    <input type="email" id="delete_email" value="{{delete_student.student_email}}" readonly><br><br>

    <label for="delete_age" >Age : </label>
    <input type="number" id="delete_age" value="{{delete_student.student_age}}" readonly><br><br>

    <button type="submit"> yes / delete </button>

</form>
<p>
    <a href="{% url 'view_students' %}">
    cancel
    </a>
</p>
</body>
</html>
